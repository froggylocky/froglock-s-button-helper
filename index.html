<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>froglock's button helper</title>
    <link rel="icon" href="https://u.cubeupload.com/froglock/logof.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="https://u.cubeupload.com/froglock/logofroglocksbuttonh.png" alt="froglock's button helper logo"
            class="site-logo">
        <div class="content-grid">
            <div class="controls">
                <div class="control-group">
                    <label for="paper-size">Paper Size</label>
                    <select id="paper-size">
                        <option value="A4" selected>A4 (21 x 29.7 cm)</option>
                        <option value="A3">A3 (29.7 x 42 cm)</option>
                        <option value="A2">A2 (42 x 59.4 cm)</option>
                        <option value="A1">A1 (59.4 x 84.1 cm)</option>
                        <option value="Letter">Letter (21.59 x 27.94 cm)</option>
                        <option value="custom">Custom Size</option>
                    </select>
                </div>

                <div class="control-group custom-dimensions hidden">
                    <label>Paper Size (cm)</label>
                    <div class="input-row">
                        <input type="number" id="paper-w" value="21" step="0.1">
                        <span>×</span>
                        <input type="number" id="paper-h" value="29.7" step="0.1">
                    </div>
                </div>

                <div class="control-group">
                    <label for="target-size">Target Size (mm)</label>
                    <input type="number" id="target-size" value="58" step="1">
                </div>


                <div class="control-group">
                    <label for="dpi">Print DPI</label>
                    <input type="number" id="dpi" value="300" step="1">
                </div>

                <div class="control-group">
                    <label for="button-qty">Button Quantity</label>
                    <input type="number" id="button-qty" value="1" min="1" step="1" title="How many copies to print">
                </div>

                <div class="control-group">
                    <label for="layout-style">Layout Style</label>
                    <select id="layout-style">
                        <option value="square">Square Grid (Standard)</option>
                        <option value="staggered">Staggered Grid (Compact)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="grid-rows">Row Limit</label>
                    <select id="grid-rows">
                        <option value="0">Auto-Fit (No Limit)</option>
                        <option value="2">Max 2 Rows</option>
                        <option value="3">Max 3 Rows</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Upload Image</label>
                    <input type="file" id="file-input" accept="image/*" title="Select a single image limit to 1">
                </div>

                <div class="control-group hidden" id="crop-controls">
                    <div class="input-row">
                        <button id="undo-btn" disabled>Undo</button>
                        <button id="redo-btn" disabled>Redo</button>
                    </div>
                    <div class="slider-group">
                        <label for="zoom-slider">Zoom Image</label>
                        <div class="input-row">
                            <input type="range" id="zoom-slider" min="0.1" max="5" step="0.01" value="1">
                            <input type="number" id="zoom-number" min="0.1" max="5" step="0.01" value="1"
                                class="number-input">
                        </div>
                    </div>

                    <div class="slider-group">
                        <label for="x-slider">Pan X</label>
                        <div class="input-row">
                            <input type="range" id="x-slider" min="-1000" max="1000" step="1" value="0">
                            <input type="number" id="x-number" min="-1000" max="1000" step="1" value="0"
                                class="number-input">
                        </div>
                    </div>

                    <div class="slider-group">
                        <label for="y-slider">Pan Y</label>
                        <div class="input-row">
                            <input type="range" id="y-slider" min="-1000" max="1000" step="1" value="0">
                            <input type="number" id="y-number" min="-1000" max="1000" step="1" value="0"
                                class="number-input">
                        </div>
                    </div>
                    <small>Or drag the image in the preview to pan</small>
                </div>

                <button id="export-btn" disabled>Export Transparent PNG</button>
                <div id="export-warning" class="warning-text hidden">Target size is larger than paper size!</div>
            </div>

            <div class="preview-section">
                <h2>Preview</h2>
                <canvas id="preview-canvas"></canvas>
            </div>
        </div>
    </div>
    <div id="export-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Export Preview</h2>
            <div class="modal-canvas-container">
                <canvas id="modal-canvas"></canvas>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="cancel-btn">Cancel</button>
                <button id="modal-download-btn">Download Image</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
